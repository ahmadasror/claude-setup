name: validate-agents

on:
  push:
    paths:
      - 'agents/**.md'
      - '.github/workflows/validate-agents.yml'
  pull_request:
    paths:
      - 'agents/**.md'
      - '.github/workflows/validate-agents.yml'

jobs:
  frontmatter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate agent frontmatter
        run: bash scripts/validate-agent-frontmatter.sh
